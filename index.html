<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>出國行李清單</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--border2:#ccc;
  --accent:#1D9E75;--accent-bg:#e1f5ee;
  --info:#378ADD;--info-bg:#e6f1fb;
  --danger:#E24B4A;--danger-bg:#fcebeb;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;
    --border:#3a3a3a;--border2:#555;
    --accent:#1D9E75;--accent-bg:#04342c;
    --info:#378ADD;--info-bg:#042c53;
    --danger:#E24B4A;--danger-bg:#501313;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid var(--border2);background:var(--bg);border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text);transition:background 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.success{color:var(--accent);border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:0.9}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:600}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--border)}
.tab{padding:9px 18px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.section{margin-bottom:10px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg2);border-radius:var(--radius);cursor:pointer;border:1px solid var(--border)}
.section-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.section-count{font-size:12px;color:var(--text2)}
.section-progress{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.section-progress-bar{height:100%;background:var(--accent);transition:width 0.3s}
.items-list{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.item-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg);transition:background 0.1s}
.item-row:last-of-type{border-bottom:none}
.item-row.checked{background:var(--bg2)}
.item-row.checked .item-name{color:var(--text3);text-decoration:line-through}
.item-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s;background:var(--bg)}
.item-check.checked{background:var(--accent);border-color:var(--accent)}
.item-check.checked::after{content:'✓';color:white;font-size:12px;font-weight:700}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;line-height:1.4}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.qty-badge{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:10px}
.member-tag{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500}
.member-rows{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.member-item-row{display:flex;align-items:center;gap:7px;padding:3px 0 3px 4px}
.member-item-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;background:var(--bg)}
.member-item-check.checked{background:var(--accent);border-color:var(--accent)}
.member-item-check.checked::after{content:'✓';color:white;font-size:9px;font-weight:700}
.member-item-name{font-size:12px;color:var(--text2)}
.item-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.item-row:hover .item-actions{opacity:1}
@media(max-width:500px){.item-actions{opacity:1}}
.icon-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:var(--radius);color:var(--text2);font-size:16px;transition:all 0.15s}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.icon-btn.del:hover{color:var(--danger)}
.add-item-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border);background:var(--bg)}
.add-item-input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none}
.add-item-input::placeholder{color:var(--text3)}
.no-items{padding:32px 16px;text-align:center;color:var(--text2)}
.no-items i{font-size:36px;display:block;margin-bottom:10px;color:var(--text3)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:440px;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.member-checks{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.member-check-item{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer}
.member-check-item input[type=checkbox]{cursor:pointer}
.member-qty-wrap{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:12px;color:var(--text2)}
.member-qty{width:52px;padding:4px 6px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;text-align:center;background:var(--bg);color:var(--text)}

/* Members modal */
.members-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.member-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;background:var(--bg)}
.member-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.member-del{cursor:pointer;color:var(--text3);font-size:14px;margin-left:2px;line-height:1}
.member-del:hover{color:var(--danger)}
.add-member-row{display:flex;gap:8px}
.add-member-row input{flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);outline:none}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title"><i class="ti ti-plane" aria-hidden="true"></i>出國行李清單</div>
    <div class="header-actions">
      <button class="btn" onclick="openMembersModal()"><i class="ti ti-users" aria-hidden="true"></i>成員</button>
      <button class="btn success" onclick="addAllBacklog()"><i class="ti ti-download" aria-hidden="true"></i>加入全部備用</button>
      <button class="btn danger" onclick="uncheckAll()"><i class="ti ti-refresh" aria-hidden="true"></i>全部反勾選</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('main',this)">主要清單</button>
    <button class="tab" onclick="switchTab('backlog',this)">備用 Backlog <span id="backlog-count"></span></button>
  </div>

  <div id="tab-main"></div>
  <div id="tab-backlog" style="display:none"></div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script>
const MEMBER_COLORS=['#378ADD','#D4537E','#1D9E75','#BA7517','#7F77DD','#D85A30','#E24B4A'];

const RAW_DATA=[
  {cat:'服飾',icon:'ti-shirt',items:[

    {name:'吹風機',members:[{name:'貝',qty:1}]},
    {name:'行動電源',qty:2},{name:'Google TV + 遙控器'},{name:'Insta 360'},
    {name:'360充電器'},{name:'360夾背帶'},{name:'手機掛繩'},{name:'Apple Watch'},
    {name:'手機充電線',qty:2},{name:'行動電源充電線'},{name:'Type C充電線'},
    {name:'行李秤'},{name:'自拍棒'},{name:'頭燈',qty:2},{name:'旅行鍋'},
    {name:'手電筒'},{name:'鎖頭',qty:4},{name:'電蚊香'},{name:'手機腳架'},
    {name:'防水手機袋（泡溫泉用）'}
  ]},
  {cat:'食物 & 廚具',icon:'ti-bowl',items:[
    {name:'湯包/沖泡包',members:[{name:'媽',qty:1}]},
    {name:'食物保鮮袋',members:[{name:'媽',qty:1}]},
    {name:'菜瓜布',members:[{name:'媽',qty:1}]},
    {name:'洗碗精',members:[{name:'媽',qty:1}]},
    {name:'水果刀',members:[{name:'貝',qty:1}]},
    {name:'刨刀',members:[{name:'媽',qty:1}]},
    {name:'泡麵'},

  ]},
  {cat:'開車必備',icon:'ti-car',items:[
    {name:'大保溫瓶'},{name:'悶燒罐（裡面塞咖啡包）'},
    {name:'濕紙巾（大）',qty:2,members:[{name:'卡',qty:1},{name:'媽',qty:1}]},
    {name:'濕紙巾（小）',qty:4,members:[{name:'媽',qty:2},{name:'卡',qty:2}]},
    {name:'保冷袋',members:[{name:'境',qty:1}]},
    {name:'小酒精瓶'},{name:'2公升水袋',qty:2},{name:'脖枕'},
    {name:'垃圾袋'},{name:'黏土'},{name:'墨鏡'},{name:'手機架'},
    {name:'行車記錄器'},{name:'USB線'},{name:'蛋白粉杯'},
    {name:'鏟雪刷',qty:2,members:[{name:'境',qty:2}]},
    {name:'露營車上馬桶分解劑'},{name:'除臭噴霧'}
  ]},
  {cat:'梳妝品',icon:'ti-sparkles',items:[
    {name:'隱形眼鏡（拋棄式）'},{name:'身體乳'},{name:'面膜'},
    {name:'洗髮乳'},{name:'沐浴乳'},{name:'化妝棉'},{name:'酒精棉片'},
    {name:'木瓜霜'},{name:'頭皮藥'},{name:'指甲剪',qty:2},{name:'棉花棒'},
    {name:'牙線棒'},{name:'眼霜'},{name:'護手霜（Aesop）'},{name:'眼鏡'},
    {name:'眼鏡盒'},{name:'蒸眼罩'},{name:'白花油'},{name:'護髮油'},
    {name:'卸妝水'},{name:'防曬乳',qty:3},{name:'爽身膏'},{name:'生髮水'},

  ]},

    {name:'Eve（止痛藥）'},{name:'OK蹦'},{name:'暈車藥'},{name:'益生菌'},
    {name:'痠痛貼布'},{name:'綁腳趾頭繃帶'},{name:'喉糖（隨身）'},{name:'胃藥'},
    {name:'隨身藥罐'},{name:'中藥'},{name:'噴鼻藥'},{name:'防蚊貼'},{name:'感冒藥'}
  ]},
  {cat:'備品 & 雜物',icon:'ti-tools',items:[
    {name:'衣架（境）',qty:4,members:[{name:'境',qty:4}]},
    {name:'衣架（媽）',qty:10,members:[{name:'媽',qty:10}]},
    {name:'衣架（貝）',qty:10,members:[{name:'貝',qty:10}]},
    {name:'衣夾子',qty:6,members:[{name:'卡',qty:6}]},
    {name:'吊衣繩（貝）',members:[{name:'貝',qty:1}]},
    {name:'吊衣繩（媽）',members:[{name:'媽',qty:1}]},
    {name:'洗衣精小瓶',qty:2,members:[{name:'媽',qty:2}]},
    {name:'洗衣袋（大）',qty:2,members:[{name:'媽',qty:2}]},
    {name:'內衣洗衣袋',members:[{name:'媽',qty:1}]},
    {name:'食物夾（隨身）'},{name:'環保袋'},{name:'口罩（隨身）'},{name:'夾鏈袋'},
    {name:'小塑膠袋'},{name:'折疊碗',qty:2},{name:'木頭推拿棒'},{name:'髮圈'},
    {name:'洗衣折疊袋（洗衣蛋用）'},{name:'絲瓜巾'}
  ]},
  {cat:'文件',icon:'ti-file-text',items:[
    {name:'台灣駕照'},{name:'國際駕照'},{name:'金剛經'},{name:'筆'},
    {name:'申根國家文件',qty:5},{name:'Costco卡'},{name:'大小照片各兩張'},
    {name:'護照'},{name:'SIM卡（卡套不能丟）'}
  ]},
  {cat:'臥鋪盥洗包',icon:'ti-moon',items:[
    {name:'一包衛生紙'},{name:'黑色短袖'},{name:'內褲'},{name:'內衣'},
    {name:'免洗浴巾'},{name:'小罐沐浴乳'},{name:'小罐洗髮乳'},{name:'小罐洗臉'},
    {name:'絲瓜巾'},{name:'睡衣短褲'}
  ]},
  {cat:'飛機過夜包',icon:'ti-plane',items:[
    {name:'牙線'},{name:'面膜'},{name:'乳霜'},{name:'眼鏡盒'},
    {name:'隱形眼鏡'},{name:'眼藥水'},{name:'木瓜霜'},{name:'發熱眼罩'},
    {name:'耳塞',qty:4},{name:'綁頭髮'},{name:'水袋'},{name:'護手霜'},
    {name:'洗臉肥皂'},{name:'喉糖'},{name:'胃藥'},
    {name:'大腿綁帶（固定腳睡覺）'},{name:'折疊椅（放腳用）'}
  ]}
];

let state;
const STORAGE_KEY='packing-list-v1';

function loadState(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){state=JSON.parse(saved);return;}
  }catch(e){}
  initDefaultState();
}

function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}

function initDefaultState(){
  state={
    members:['媽','貝','境','卡'],
    categories:RAW_DATA.map(c=>({
      cat:c.cat,icon:c.icon,expanded:true,
      items:c.items.map(it=>({
        id:uid(),name:it.name,qty:it.qty||1,
        checked:false,members:it.members||[],memberChecks:{}
      }))
    })),
    backlog:[]
  };
}

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function getMemberColor(name){
  const i=state.members.indexOf(name);
  return MEMBER_COLORS[i%MEMBER_COLORS.length]||'#888';
}

function render(){
  saveState();
  updateStats();
  renderMain();
  renderBacklog();
  document.getElementById('backlog-count').textContent=state.backlog.length?`(${state.backlog.length})`:'';
}

function updateStats(){
  let total=0,checked=0;
  state.categories.forEach(c=>c.items.forEach(it=>{
    total++;
    const allDone=it.members.length>0?it.members.every(m=>it.memberChecks[m.name]):it.checked;
    if(allDone)checked++;
  }));
  const pct=total?Math.round(checked/total*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-num" style="color:var(--accent)">${checked}/${total}</div><div class="stat-label">已勾選 / 總計</div></div>
    <div class="stat"><div class="stat-num">${total-checked}</div><div class="stat-label">待確認</div></div>
    <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-label">完成進度</div></div>
  `;
}

function renderMain(){
  const el=document.getElementById('tab-main');
  let html='';
  state.categories.forEach((cat,ci)=>{
    const total=cat.items.length;
    const done=cat.items.filter(it=>it.members.length>0?it.members.every(m=>it.memberChecks[m.name]):it.checked).length;
    const pct=total?Math.round(done/total*100):0;
    html+=`<div class="section">
      <div class="section-header" onclick="toggleCat(${ci})">
        <div class="section-title">
          <i class="ti ${cat.icon}" aria-hidden="true"></i>${cat.cat}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-count">${done}/${total}</span>
          <i class="ti ti-chevron-${cat.expanded?'up':'down'}" aria-hidden="true" style="font-size:14px;color:var(--text2)"></i>
        </div>
      </div>
      <div class="section-progress"><div class="section-progress-bar" style="width:${pct}%"></div></div>`;
    if(cat.expanded){
      html+=`<div class="items-list">`;
      if(cat.items.length===0){
        html+=`<div style="padding:12px 14px;font-size:13px;color:var(--text3)">暫無項目</div>`;
      } else {
        cat.items.forEach((item,ii)=>{html+=renderItemRow(item,ci,ii,false);});
      }
      html+=`<div class="add-item-row">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:14px;color:var(--text3)"></i>
        <input class="add-item-input" type="text" placeholder="新增項目..." onkeydown="if(event.key==='Enter')addItem(${ci},this)">
      </div></div>`;
    }
    html+=`</div>`;
  });
  el.innerHTML=html;
}

function renderItemRow(item,ci,ii,isBacklog){
  const hasMembers=item.members.length>0;
  const allDone=hasMembers?item.members.every(m=>item.memberChecks[m.name]):item.checked;
  let memberHtml='';
  if(hasMembers){
    memberHtml='<div class="member-rows">';
    item.members.forEach(m=>{
      const mc=item.memberChecks[m.name]||false;
      const col=getMemberColor(m.name);
      memberHtml+=`<div class="member-item-row">
        <div class="member-item-check${mc?' checked':''}" onclick="toggleMemberCheck(${ci},${ii},'${m.name}',${isBacklog})"></div>
        <span class="member-tag" style="background:${col}22;color:${col}">${m.name}</span>
        ${m.qty>1?`<span style="font-size:11px;color:var(--text3)">×${m.qty}</span>`:''}
      </div>`;
    });
    memberHtml+='</div>';
  }
  return `<div class="item-row${allDone?' checked':''}">
    <div class="item-check${allDone?' checked':''}" onclick="toggleCheck(${ci},${ii},${isBacklog})"></div>
    <div class="item-main">
      <div class="item-name">${item.name}</div>
      ${item.qty>1&&!hasMembers?`<div class="item-meta"><span class="qty-badge">×${item.qty}</span></div>`:''}
      ${memberHtml}
    </div>
    <div class="item-actions">
      <button class="icon-btn" onclick="editItem(${ci},${ii},${isBacklog})" title="編輯"><i class="ti ti-edit" aria-hidden="true"></i></button>
      <button class="icon-btn" onclick="${isBacklog?`restoreItem(${ii})`:`moveToBacklog(${ci},${ii})`}" title="${isBacklog?'加回清單':'移至備用'}">
        <i class="ti ti-${isBacklog?'arrow-back-up':'archive'}" aria-hidden="true"></i>
      </button>
      <button class="icon-btn del" onclick="${isBacklog?`deleteBacklog(${ii})`:`deleteItem(${ci},${ii})`}" title="刪除"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>
  </div>`;
}

function renderBacklog(){
  const el=document.getElementById('tab-backlog');
  if(state.backlog.length===0){
    el.innerHTML='<div class="no-items"><i class="ti ti-inbox" aria-hidden="true"></i>沒有備用項目<br><small style="color:var(--text3);margin-top:6px;display:block">將主清單項目移至此處，下次旅程可一鍵加回</small></div>';
    return;
  }
  let html='<div class="items-list">';
  state.backlog.forEach((item,ii)=>{html+=renderItemRow(item,-1,ii,true);});
  html+='</div>';
  el.innerHTML=html;
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-main').style.display=tab==='main'?'':'none';
  document.getElementById('tab-backlog').style.display=tab==='backlog'?'':'none';
}

function toggleCat(ci){state.categories[ci].expanded=!state.categories[ci].expanded;render();}

function toggleCheck(ci,ii,isBacklog){
  const item=isBacklog?state.backlog[ii]:state.categories[ci].items[ii];
  item.checked=!item.checked;
  if(item.members.length>0){item.members.forEach(m=>{item.memberChecks[m.name]=item.checked;});}
  render();
}

function toggleMemberCheck(ci,ii,memberName,isBacklog){
  const item=isBacklog?state.backlog[ii]:state.categories[ci].items[ii];
  item.memberChecks[memberName]=!item.memberChecks[memberName];
  item.checked=item.members.every(m=>item.memberChecks[m.name]);
  render();
}

function addItem(ci,inputEl){
  const name=inputEl.value.trim();
  if(!name)return;
  state.categories[ci].items.push({id:uid(),name,qty:1,checked:false,members:[],memberChecks:{}});
  inputEl.value='';
  render();
}

function moveToBacklog(ci,ii){
  const item=state.categories[ci].items.splice(ii,1)[0];
  state.backlog.push(item);
  showToast(`「${item.name}」已移至備用`);
  render();
}

function restoreItem(ii){
  const item=state.backlog.splice(ii,1)[0];
  openRestoreModal(item);
}

function deleteItem(ci,ii){
  if(!confirm(`確定刪除「${state.categories[ci].items[ii].name}」？`))return;
  state.categories[ci].items.splice(ii,1);
  render();
}

function deleteBacklog(ii){
  if(!confirm(`確定刪除「${state.backlog[ii].name}」？`))return;
  state.backlog.splice(ii,1);
  render();
}

function uncheckAll(){
  if(!confirm('確定要將所有項目反勾選？'))return;
  state.categories.forEach(c=>c.items.forEach(it=>{it.checked=false;it.memberChecks={};}));
  state.backlog.forEach(it=>{it.checked=false;it.memberChecks={};});
  showToast('已全部反勾選');render();
}

function addAllBacklog(){
  if(state.backlog.length===0){showToast('沒有備用項目');return;}
  const count=state.backlog.length;
  openAddBacklogModal(count);
}

function openAddBacklogModal(count){
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>加入備用項目</h3>
      <div class="form-group">
        <label>選擇加入的分類（共 ${count} 個項目）</label>
        <select id="restore-cat-all">
          ${state.categories.map((c,i)=>`<option value="${i}">${c.cat}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn primary" onclick="confirmAddAllBacklog()">加入</button>
      </div>
    </div>
  </div>`;
}

function confirmAddAllBacklog(){
  const ci=parseInt(document.getElementById('restore-cat-all').value);
  const count=state.backlog.length;
  state.backlog.forEach(item=>state.categories[ci].items.push(item));
  state.backlog=[];
  closeModal();
  showToast(`已將 ${count} 個項目加入「${state.categories[ci].cat}」`);
  render();
}

function openRestoreModal(item){
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>選擇加入的分類</h3>
      <div class="form-group">
        <label>「${item.name}」要加入哪個分類？</label>
        <select id="restore-cat">
          ${state.categories.map((c,i)=>`<option value="${i}">${c.cat}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal();render()">取消</button>
        <button class="btn primary" onclick="confirmRestore(${JSON.stringify(JSON.stringify(item))})">加入</button>
      </div>
    </div>
  </div>`;
  window._restoreItem=item;
}

function confirmRestore(itemJson){
  const ci=parseInt(document.getElementById('restore-cat').value);
  state.categories[ci].items.push(window._restoreItem);
  closeModal();showToast('已加回主清單');render();
}

function editItem(ci,ii,isBacklog){
  const item=isBacklog?state.backlog[ii]:state.categories[ci].items[ii];
  window._editCtx={ci,ii,isBacklog};
  const mc=document.getElementById('modal-container');
  let memberInputs=state.members.map(m=>{
    const existing=item.members.find(x=>x.name===m);
    const chk=!!existing;const qty=existing?existing.qty:1;
    const col=getMemberColor(m);
    return `<div class="member-check-item" style="${chk?`border-color:${col};background:${col}11`:''}" id="mci_${m}">
      <input type="checkbox" id="em_${m}" ${chk?'checked':''} onchange="toggleEditMember('${m}','${col}')">
      <label for="em_${m}" style="cursor:pointer;color:${chk?col:'var(--text)'}">${m}</label>
      <div class="member-qty-wrap">
        <span>×</span><input type="number" class="member-qty" id="emq_${m}" value="${qty}" min="1" ${!chk?'disabled':''}>
      </div>
    </div>`;
  }).join('');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>編輯項目</h3>
      <div class="form-group"><label>名稱</label><input id="edit-name" value="${item.name}"></div>
      <div class="form-group"><label>總數量</label><input id="edit-qty" type="number" min="1" value="${item.qty}"></div>
      <div class="form-group"><label>指定成員</label><div class="member-checks">${memberInputs||'<span style="color:var(--text3);font-size:13px">尚未設定成員，請先在「成員」中新增</span>'}</div></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn primary" onclick="saveEdit()">儲存</button>
      </div>
    </div>
  </div>`;
}

function toggleEditMember(name,col){
  const cb=document.getElementById('em_'+name);
  const qi=document.getElementById('emq_'+name);
  const ci=document.getElementById('mci_'+name);
  qi.disabled=!cb.checked;
  if(cb.checked){ci.style.borderColor=col;ci.style.background=col+'11';ci.querySelector('label').style.color=col;}
  else{ci.style.borderColor='';ci.style.background='';ci.querySelector('label').style.color='var(--text)';}
}

function saveEdit(){
  const ctx=window._editCtx;
  const item=ctx.isBacklog?state.backlog[ctx.ii]:state.categories[ctx.ci].items[ctx.ii];
  item.name=document.getElementById('edit-name').value.trim()||item.name;
  item.qty=parseInt(document.getElementById('edit-qty').value)||1;
  const newMembers=[];
  state.members.forEach(m=>{
    const cb=document.getElementById('em_'+m);
    if(cb&&cb.checked){const qty=parseInt(document.getElementById('emq_'+m).value)||1;newMembers.push({name:m,qty});}
  });
  item.members=newMembers;
  closeModal();render();
}

function openMembersModal(){
  const mc=document.getElementById('modal-container');
  const chips=state.members.map((m,i)=>{
    const col=getMemberColor(m);
    return `<div class="member-chip">
      <div class="member-dot" style="background:${col}"></div>
      ${m}
      <span class="member-del" onclick="deleteMember(${i})">×</span>
    </div>`;
  }).join('');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>成員管理</h3>
      <div class="members-list">${chips||'<span style="color:var(--text3);font-size:13px">尚未新增成員</span>'}</div>
      <div class="form-group">
        <label>新增成員</label>
        <div class="add-member-row">
          <input id="new-member" placeholder="輸入名稱" onkeydown="if(event.key==='Enter')addMember()">
          <button class="btn primary" onclick="addMember()"><i class="ti ti-plus" aria-hidden="true"></i>新增</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn primary" onclick="closeModal()">完成</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{const el=document.getElementById('new-member');if(el)el.focus();},100);
}

function addMember(){
  const input=document.getElementById('new-member');
  const name=input.value.trim();
  if(!name){showToast('請輸入名稱');return;}
  if(state.members.includes(name)){showToast('成員已存在');return;}
  state.members.push(name);
  saveState();
  openMembersModal();
}

function deleteMember(i){
  const name=state.members[i];
  if(!confirm(`確定移除「${name}」？相關指定記錄也會一併刪除`))return;
  state.members.splice(i,1);
  state.categories.forEach(c=>c.items.forEach(it=>{
    it.members=it.members.filter(m=>m.name!==name);
    delete it.memberChecks[name];
  }));
  saveState();
  openMembersModal();
  render();
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

loadState();
render();
</script>
</body>
</html>
