<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<title>出國行李清單</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--border2:#ccc;
  --accent:#1D9E75;--accent-light:#e1f5ee;
  --danger:#E24B4A;
  --radius:8px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:#38383a;--border2:#48484a;
  --accent-light:#0a3025;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:16px 16px 40px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.title{font-size:19px;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap}
.title i{color:var(--accent)}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border:1px solid var(--border2);background:var(--bg);border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text);transition:all .15s;white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.97)}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.accent:hover{opacity:.88}
.btn.danger-ol{color:var(--danger);border-color:var(--danger)}
.btn.success-ol{color:var(--accent);border-color:var(--accent)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:10px 8px;text-align:center}
.stat-num{font-size:21px;font-weight:700}
.stat-num.green{color:var(--accent)}
.stat-label{font-size:10px;color:var(--text2);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tab{padding:9px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;transition:color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Cat chips */
.cat-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:12px}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s;flex-shrink:0}
.cat-chip:active{transform:scale(.95)}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip-count{font-size:10px;border-radius:8px;padding:1px 5px;margin-left:2px;background:rgba(255,255,255,.3)}
.cat-chip:not(.active) .chip-count{background:var(--bg3);color:var(--text2)}

/* Multi-select toolbar */
.sel-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;border:1px solid var(--border)}
.sel-all-wrap{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;min-width:0}
.sel-all-label{font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap}
.sel-count-label{font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap}
.sel-toolbar .btn{padding:6px 10px;font-size:12px}

/* Round checkbox used in sel-toolbar and items */
.rcheck{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg);cursor:pointer}
.rcheck.on{background:var(--accent);border-color:var(--accent)}
.rcheck.on::after{content:'✓';color:#fff;font-size:11px;font-weight:800}
.rcheck.indeterminate{background:var(--bg);border-color:var(--accent)}
.rcheck.indeterminate::after{content:'–';color:var(--accent);font-size:13px;font-weight:800}

/* Section */
.section{margin-bottom:8px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;border:1px solid var(--border);border-bottom:none;user-select:none}
.section-header.collapsed{border-radius:var(--radius);border-bottom:1px solid var(--border)}
.section-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.section-right{display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;color:var(--text2);font-weight:500}
.prog-wrap{height:2px;background:var(--border);overflow:hidden}
.prog-bar{height:100%;background:var(--accent);transition:width .4s}

/* Items */
.items-list{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.item-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg);transition:background .12s;cursor:default}
.item-row:last-child{border-bottom:none}
.item-row.done{background:var(--bg2)}
.item-row.done .item-name{color:var(--text3);text-decoration:line-through}
.item-row.sel-on{background:var(--accent-light)!important}
.item-row.sel-on .item-name{color:var(--text)!important;text-decoration:none!important}
.item-row.selectable{cursor:pointer}

/* Normal check */
.item-check{width:21px;height:21px;border-radius:5px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;background:var(--bg)}
.item-check.on{background:var(--accent);border-color:var(--accent)}
.item-check.on::after{content:'✓';color:#fff;font-size:12px;font-weight:800}

.item-main{flex:1;min-width:0}
.item-name{font-size:14px;line-height:1.45;word-break:break-word}
.qty-badge{display:inline-block;font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 7px;border-radius:9px;margin-top:4px}
.member-rows{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.member-row{display:flex;align-items:center;gap:7px;padding:3px 0}
.m-check{width:17px;height:17px;border-radius:4px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg)}
.m-check.on{background:var(--accent);border-color:var(--accent)}
.m-check.on::after{content:'✓';color:#fff;font-size:9px;font-weight:800}
.m-tag{font-size:11px;padding:2px 8px;border-radius:9px;font-weight:600;white-space:nowrap}
.m-qty{font-size:11px;color:var(--text3)}

.item-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.item-row:hover .item-actions{opacity:1}
@media(hover:none){.item-actions{opacity:1}}
.iab{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--text2);font-size:16px;transition:all .15s}
.iab:hover{background:var(--bg3);color:var(--text)}
.iab.del:hover{color:var(--danger)}

/* Add row */
.add-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border);background:var(--bg)}
.add-input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);outline:none;min-width:0}
.add-input::placeholder{color:var(--text3)}

/* Empty */
.empty{padding:40px 16px;text-align:center;color:var(--text2)}
.empty i{font-size:40px;display:block;margin-bottom:10px;color:var(--text3)}
.empty p{font-size:14px;margin-bottom:4px}
.empty small{font-size:12px;color:var(--text3)}

/* Modal – bottom sheet on mobile */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
@media(min-width:500px){.mbg{align-items:center;padding:16px}}
.modal{background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px 36px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto}
@media(min-width:500px){.modal{border-radius:var(--radius-lg);padding:20px}}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;display:block}
@media(min-width:500px){.mhandle{display:none}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.member-checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.mci{display:flex;flex-direction:column;gap:4px;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);min-width:80px}
.mci-top{display:flex;align-items:center;gap:6px}
.mci-qty{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2)}
.mci-qty input{width:50px;padding:3px 6px;border:1px solid var(--border2);border-radius:5px;font-size:12px;text-align:center;background:var(--bg);color:var(--text)}
.mlist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.mchip{display:flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--border);border-radius:20px;font-size:13px;background:var(--bg);font-weight:500}
.mdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mdel{cursor:pointer;color:var(--text3);font-size:15px;margin-left:2px;padding:0 2px;line-height:1}
.mdel:hover{color:var(--danger)}
.add-m-row{display:flex;gap:8px}
.add-m-row input{flex:1;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);outline:none}
.confirm-modal{background:var(--bg);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:320px;border:1px solid var(--border)}
.confirm-modal p{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;z-index:300;pointer-events:none;white-space:nowrap;font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-color-scheme:dark){.toast{background:#f0f0f0;color:#111}}
</style>

<div class="app">

      <button class="btn danger-ol" id="btn-uncheck"><i class="ti ti-refresh"></i>反勾選</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" data-tab="main">主要清單</button>

      <button class="btn accent" id="main-sel-move" style="display:none"><i class="ti ti-archive"></i>移至備用</button>
    </div>

    <div id="sections-list"></div>
  </div>

  <!-- BACKLOG TAB -->
  <div id="tab-backlog" style="display:none">
    <!-- Backlog select toolbar -->
    <div class="sel-toolbar" id="bl-sel-toolbar">
      <div class="sel-all-wrap" id="bl-sel-all">

        <span class="sel-all-label" id="bl-sel-label">多選</span>

      <button class="btn accent" id="bl-sel-add" style="display:none"><i class="ti ti-list-check"></i>加入清單</button>
    </div>

    <div id="backlog-list"></div>
  </div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

let S;

function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){S=JSON.parse(r);return;}}catch(e){}
  resetState();
}
function resetState(){
  S={members:['媽','貝','境','卡'],
    cats:RAW.map(r=>({cat:r.cat,icon:r.icon,expanded:true,items:r.items.map(mkItem)})),
    backlog:[],activeCat:null};
}
function mkItem(it){
  return{id:uid(),name:it.n||it.name||'',qty:it.q||it.qty||1,checked:false,
    members:(it.m||it.members||[]).map(m=>({name:m.n||m.name,qty:m.q||m.qty||1})),mc:{}};
}
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3)}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S));}catch(e){}}
function mcolor(name){const i=S.members.indexOf(name);return COLORS[i>=0?i%COLORS.length:0]}

// ── Multi-select state ─────────────────────────────────────────────
// mode: null | 'main' | 'backlog'
let selMode=null;
let selIds=new Set();

function getAllMainIds(){
  const ids=[];
  S.cats.forEach(c=>c.items.forEach(it=>ids.push(it.id)));
  return ids;
}
function getAllBacklogIds(){return S.backlog.map(it=>it.id);}

function enterSel(mode){
  selMode=mode; selIds=new Set();
  updateSelToolbar();
  renderItems();
}
function exitSel(){
  selMode=null; selIds=new Set();
  updateSelToolbar();
  renderItems();
}
function toggleSelId(id){
  if(selIds.has(id)) selIds.delete(id); else selIds.add(id);
  updateSelToolbar();
  // Patch just this row
  const row=document.querySelector(`[data-id="${id}"]`);
  if(row){
    const on=selIds.has(id);
    row.classList.toggle('sel-on',on);
    const rc=row.querySelector('.rcheck');
    if(rc) rc.classList.toggle('on',on);
  }
}

function updateSelToolbar(){
  // Main toolbar
  const mainActive=selMode==='main';
  const mainIds=getAllMainIds();
  const mainSel=mainIds.filter(id=>selIds.has(id)).length;
  const mainAll=mainIds.length;
  const mrc=document.getElementById('main-rcheck');
  const mLabel=document.getElementById('main-sel-label');
  const mCount=document.getElementById('main-sel-count');
  const mCancel=document.getElementById('main-sel-cancel');
  const mMove=document.getElementById('main-sel-move');
  if(mainActive){
    mLabel.style.display='none'; mCount.style.display='';
    mCancel.style.display=''; mMove.style.display='';
    mCount.textContent=`已選 ${mainSel} 項`;
    mrc.className='rcheck'+(mainSel===0?'':mainSel===mainAll?' on':' indeterminate');
    mMove.disabled=mainSel===0;
    mMove.style.opacity=mainSel===0?'0.4':'1';
  } else {
    mLabel.style.display=''; mCount.style.display='none';
    mCancel.style.display='none'; mMove.style.display='none';
    mrc.className='rcheck';
  }

  // Backlog toolbar
  const blActive=selMode==='backlog';
  const blIds=getAllBacklogIds();
  const blSel=blIds.filter(id=>selIds.has(id)).length;
  const blAll=blIds.length;
  const brc=document.getElementById('bl-rcheck');
  const bLabel=document.getElementById('bl-sel-label');
  const bCount=document.getElementById('bl-sel-count');
  const bCancel=document.getElementById('bl-sel-cancel');
  const bAdd=document.getElementById('bl-sel-add');
  if(blActive){
    bLabel.style.display='none'; bCount.style.display='';
    bCancel.style.display=''; bAdd.style.display='';
    bCount.textContent=`已選 ${blSel} 項`;
    brc.className='rcheck'+(blSel===0?'':blSel===blAll?' on':' indeterminate');
    bAdd.disabled=blSel===0;
    bAdd.style.opacity=blSel===0?'0.4':'1';
  } else {
    bLabel.style.display=''; bCount.style.display='none';
    bCancel.style.display='none'; bAdd.style.display='none';
    brc.className='rcheck';
  }

  // badge
  document.getElementById('backlog-badge').textContent=S.backlog.length?`(${S.backlog.length})`:'';
}

// ── Render ─────────────────────────────────────────────────────────
function render(){
  save();
  renderStats();
  renderChips();
  renderItems();
  updateSelToolbar();
}

function renderItems(){
  renderSections();
  renderBacklog();
}

function renderStats(){
  let total=0,done=0;
  S.cats.forEach(c=>c.items.forEach(it=>{total++;if(isDone(it))done++;}));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-num green">${done}/${total}</div><div class="stat-label">已勾選</div></div>
    <div class="stat"><div class="stat-num">${total-done}</div><div class="stat-label">待確認</div></div>
    <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-label">完成度</div></div>`;
}
function isDone(it){return it.members.length>0?it.members.every(m=>it.mc[m.name]):it.checked;}

function renderChips(){
  document.getElementById('cat-chips').innerHTML=S.cats.map((c,ci)=>{
    const done=c.items.filter(isDone).length;
    const active=S.activeCat===ci;
    return `<div class="cat-chip${active?' active':''}" data-ci="${ci}">
      <i class="ti ${c.icon}" style="font-size:13px"></i>${c.cat}
      <span class="chip-count">${done}/${c.items.length}</span>
    </div>`;
  }).join('');
}

function renderSections(){
  const isSelMain=selMode==='main';
  const catsToShow=S.activeCat!==null?[{c:S.cats[S.activeCat],ci:S.activeCat}]:S.cats.map((c,ci)=>({c,ci}));
  document.getElementById('sections-list').innerHTML=catsToShow.map(({c,ci})=>{
    const total=c.items.length;
    const done=c.items.filter(isDone).length;
    const pct=total?Math.round(done/total*100):0;
    const collapsed=!c.expanded;
    let html=`<div class="section" id="sec-${ci}">
      <div class="section-header${collapsed?' collapsed':''}" data-action="toggle-cat" data-ci="${ci}">
        <div class="section-title"><i class="ti ${c.icon}" style="font-size:15px"></i>${c.cat}</div>
        <div class="section-right">
          <span class="section-count">${done}/${total}</span>
          <i class="ti ti-chevron-${collapsed?'down':'up'}" style="font-size:14px;color:var(--text2)"></i>
        </div>
      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>`;
    if(c.expanded){
      html+=`<div class="items-list">`;
      if(c.items.length===0){
        html+=`<div style="padding:12px 14px;font-size:13px;color:var(--text3)">暫無項目</div>`;
      } else {
        c.items.forEach((item,ii)=>{html+=renderItemRow(item,ci,ii,false,isSelMain);});
      }
      html+=`<div class="add-row">
        <i class="ti ti-plus" style="font-size:14px;color:var(--text3);flex-shrink:0"></i>
        <input class="add-input" placeholder="新增項目..." data-action="add-item" data-ci="${ci}">
      </div></div>`;
    }
    return html+'</div>';
  }).join('');
}

function renderBacklog(){
  const isSelBl=selMode==='backlog';
  const el=document.getElementById('backlog-list');
  if(S.backlog.length===0){
    el.innerHTML=`<div class="empty"><i class="ti ti-inbox"></i><p>沒有備用項目</p><small>從主清單多選後移至此處</small></div>`;
    return;
  }
  el.innerHTML=`<div class="items-list">${S.backlog.map((item,ii)=>renderItemRow(item,-1,ii,true,isSelBl)).join('')}</div>`;
}

function renderItemRow(item,ci,ii,isBacklog,isSel){
  const done=isDone(item);
  const hasM=item.members.length>0;
  const selected=selIds.has(item.id);
  const ciA=isBacklog?-1:ci;

  let mHtml='';
  if(hasM){
    mHtml='<div class="member-rows">';
    item.members.forEach(m=>{
      const on=item.mc[m.name]||false;
      const col=mcolor(m.name);
      mHtml+=`<div class="member-row">
        <div class="m-check${on?' on':''}" data-action="m-check" data-ci="${ciA}" data-ii="${ii}" data-mn="${ea(m.name)}" data-bl="${isBacklog?1:0}"${isSel?' style="pointer-events:none;opacity:.4"':''}></div>
        <span class="m-tag" style="background:${col}22;color:${col}">${e(m.name)}</span>
        ${m.qty>1?`<span class="m-qty">×${m.qty}</span>`:''}
      </div>`;
    });
    mHtml+='</div>';
  }

  // Left control: round sel-check in sel mode, normal check otherwise
  const leftCtrl=isSel
    ?`<div class="rcheck${selected?' on':''}" data-action="sel-toggle" data-id="${item.id}"></div>`
    :`<div class="item-check${done?' on':''}" data-action="check" data-ci="${ciA}" data-ii="${ii}" data-bl="${isBacklog?1:0}"></div>`;

  const actions=isBacklog
    ?`<button class="iab" data-action="edit" data-ci="${ciA}" data-ii="${ii}" data-bl="1" title="編輯"><i class="ti ti-edit"></i></button>
      <button class="iab" data-action="restore" data-ci="${ciA}" data-ii="${ii}" title="加回清單"><i class="ti ti-arrow-back-up"></i></button>
      <button class="iab del" data-action="delete" data-ci="${ciA}" data-ii="${ii}" data-bl="1" title="刪除"><i class="ti ti-trash"></i></button>`
    :`<button class="iab" data-action="edit" data-ci="${ciA}" data-ii="${ii}" data-bl="0" title="編輯"><i class="ti ti-edit"></i></button>
      <button class="iab" data-action="to-backlog" data-ci="${ciA}" data-ii="${ii}" title="移至備用"><i class="ti ti-archive"></i></button>
      <button class="iab del" data-action="delete" data-ci="${ciA}" data-ii="${ii}" data-bl="0" title="刪除"><i class="ti ti-trash"></i></button>`;

  return `<div class="item-row${!isSel&&done?' done':''}${selected?' sel-on':''}${isSel?' selectable':''}" data-id="${item.id}" data-ci="${ciA}" data-ii="${ii}" data-bl="${isBacklog?1:0}">
    ${leftCtrl}
    <div class="item-main">
      <div class="item-name">${e(item.name)}</div>
      ${item.qty>1&&!hasM?`<span class="qty-badge">×${item.qty}</span>`:''}
      ${mHtml}
    </div>
    ${isSel?'':`<div class="item-actions">${actions}</div>`}
  </div>`;
}

// ── Event delegation ───────────────────────────────────────────────
document.addEventListener('click',e=>{
  // Cat chip
  const chip=e.target.closest('.cat-chip');
  if(chip&&!selMode){
    const ci=parseInt(chip.dataset.ci);
    S.activeCat=(S.activeCat===ci)?null:ci;
    render();
    if(S.activeCat!==null){
      const sec=document.getElementById('sec-'+ci);
      if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
    }
    return;
  }

  // Tab
  const tab=e.target.closest('.tab');
  if(tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const t=tab.dataset.tab;
    document.getElementById('tab-main').style.display=t==='main'?'':'none';
    document.getElementById('tab-backlog').style.display=t==='backlog'?'':'none';
    exitSel();
    return;
  }

  // In sel mode: click row body toggles selection
  if(selMode){
    const row=e.target.closest('.item-row.selectable[data-id]');
    const onAction=e.target.closest('[data-action]');
    if(row&&(!onAction||onAction.dataset.action==='sel-toggle')){
      toggleSelId(row.dataset.id);
      return;
    }
  }

  const el=e.target.closest('[data-action]');
  if(el) handleAction(el,e);
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const el=e.target.closest('[data-action="add-item"]');
    if(el) doAddItem(parseInt(el.dataset.ci),el);
  }
});

// ── Toolbar button wiring ──────────────────────────────────────────
// Main sel-all toggle
document.getElementById('main-sel-all').addEventListener('click',()=>{
  if(selMode!=='main'){enterSel('main');return;}
  const all=getAllMainIds();
  const allSelected=all.every(id=>selIds.has(id));
  if(allSelected) selIds=new Set();
  else all.forEach(id=>selIds.add(id));
  updateSelToolbar();
  renderItems();
});
document.getElementById('main-sel-cancel').addEventListener('click',exitSel);
document.getElementById('main-sel-move').addEventListener('click',()=>{
  if(selIds.size===0) return;
  const toMove=[];
  S.cats.forEach(cat=>{
    cat.items=cat.items.filter(it=>{
      if(selIds.has(it.id)){toMove.push(it);return false;}
      return true;
    });
  });
  toMove.forEach(it=>S.backlog.push(it));
  const n=toMove.length;
  exitSel();
  toast(`已將 ${n} 個項目移至備用`);
  render();
});

// Backlog sel-all toggle
document.getElementById('bl-sel-all').addEventListener('click',()=>{
  if(selMode!=='backlog'){enterSel('backlog');return;}
  const all=getAllBacklogIds();
  const allSelected=all.every(id=>selIds.has(id));
  if(allSelected) selIds=new Set();
  else all.forEach(id=>selIds.add(id));
  updateSelToolbar();
  renderItems();
});
document.getElementById('bl-sel-cancel').addEventListener('click',exitSel);
document.getElementById('bl-sel-add').addEventListener('click',()=>{
  if(selIds.size===0) return;
  const selected=[...selIds];
  openRestoreMultiModal(selected);
});

// Header buttons
document.getElementById('btn-members').addEventListener('click',openMembersModal);
document.getElementById('btn-uncheck').addEventListener('click',()=>{
  showConfirm('全部反勾選？','所有項目的勾選狀態將會清除',()=>{
    S.cats.forEach(c=>c.items.forEach(it=>{it.checked=false;it.mc={};}));
    S.backlog.forEach(it=>{it.checked=false;it.mc={};});
    render(); toast('已全部反勾選');
  });
});
document.getElementById('btn-add-backlog').addEventListener('click',()=>{
  if(S.backlog.length===0){toast('沒有備用項目');return;}
  openAddBacklogModal();
});

// ── Action handler ─────────────────────────────────────────────────
function handleAction(el,e){
  const a=el.dataset.action;
  const ci=parseInt(el.dataset.ci);
  const ii=parseInt(el.dataset.ii);
  const bl=el.dataset.bl==='1';

  if(a==='sel-toggle'){
    toggleSelId(el.dataset.id||el.closest('[data-id]')?.dataset.id);
  } else if(a==='toggle-cat'){
    S.cats[ci].expanded=!S.cats[ci].expanded; render();
  } else if(a==='check'){
    const item=bl?S.backlog[ii]:S.cats[ci].items[ii];
    item.checked=!item.checked;
    if(item.members.length>0) item.members.forEach(m=>{item.mc[m.name]=item.checked;});
    render();
  } else if(a==='m-check'){
    const item=bl?S.backlog[ii]:S.cats[ci].items[ii];
    const mn=el.dataset.mn;
    item.mc[mn]=!item.mc[mn];
    item.checked=item.members.every(m=>item.mc[m.name]);
    render();
  } else if(a==='edit'){
    openEditModal(ci,ii,bl);
  } else if(a==='to-backlog'){
    const item=S.cats[ci].items.splice(ii,1)[0];
    S.backlog.push(item);
    toast(`「${item.name}」已移至備用`); render();
  } else if(a==='restore'){
    const item=S.backlog.splice(ii,1)[0];
    render(); openRestoreModal(item);
  } else if(a==='delete'){
    const name=bl?S.backlog[ii].name:S.cats[ci].items[ii].name;
    showConfirm(`刪除「${name}」？`,'此動作無法復原',()=>{
      if(bl) S.backlog.splice(ii,1); else S.cats[ci].items.splice(ii,1);
      render();
    });
  }
}

function doAddItem(ci,inputEl){
  const name=inputEl.value.trim();if(!name)return;
  S.cats[ci].items.push(mkItem({n:name}));
  inputEl.value=''; render();
  setTimeout(()=>{
    const inp=document.querySelector(`[data-action="add-item"][data-ci="${ci}"]`);
    if(inp)inp.focus();
  },50);
}

// ── Modals ─────────────────────────────────────────────────────────
function modal(content){
  document.getElementById('modal-root').innerHTML=`<div class="mbg" id="mbg">${content}</div>`;
  document.getElementById('mbg').addEventListener('click',ev=>{if(ev.target.id==='mbg')closeModal();});
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function showConfirm(title,sub,onOk){
  modal(`<div class="confirm-modal">
    <span class="mhandle"></span>
    <h3>${e(title)}</h3><p>${e(sub)}</p>
    <div class="mactions">
      <button class="btn" id="cf-no">取消</button>
      <button class="btn accent" id="cf-yes">確定</button>
    </div></div>`);
  document.getElementById('cf-no').onclick=closeModal;
  document.getElementById('cf-yes').onclick=()=>{closeModal();onOk();};
}

function openEditModal(ci,ii,isBacklog){
  const item=isBacklog?S.backlog[ii]:S.cats[ci].items[ii];
  const mInputs=S.members.length===0
    ?'<span style="color:var(--text3);font-size:13px">請先新增成員</span>'
    :S.members.map(m=>{
      const ex=item.members.find(x=>x.name===m);
      const chk=!!ex; const qty=ex?ex.qty:1; const col=mcolor(m);
      return `<div class="mci" id="mci-${m}" style="${chk?`border-color:${col};background:${col}11`:''}">
        <div class="mci-top"><input type="checkbox" id="em-${m}"${chk?' checked':''}>
          <label for="em-${m}" style="cursor:pointer;font-weight:600;color:${chk?col:'var(--text)'}" id="eml-${m}">${e(m)}</label></div>
        <div class="mci-qty"><span>×</span><input type="number" id="emq-${m}" value="${qty}" min="1"${!chk?' disabled':''}></div>
      </div>`;
    }).join('');
  modal(`<div class="modal"><span class="mhandle"></span><h3>編輯項目</h3>
    <div class="fg"><label>名稱</label><input id="edit-name" value="${ea(item.name)}"></div>
    <div class="fg"><label>總數量</label><input id="edit-qty" type="number" min="1" value="${item.qty}"></div>
    <div class="fg"><label>指定成員</label><div class="member-checks">${mInputs}</div></div>
    <div class="mactions"><button class="btn" id="edit-no">取消</button><button class="btn accent" id="edit-yes">儲存</button></div>
  </div>`);
  document.getElementById('edit-no').onclick=closeModal;
  document.getElementById('edit-name').focus();
  S.members.forEach(m=>{
    const cb=document.getElementById('em-'+m);if(!cb)return;
    cb.addEventListener('change',()=>{
      const col=mcolor(m);
      const qi=document.getElementById('emq-'+m);
      const box=document.getElementById('mci-'+m);
      const lbl=document.getElementById('eml-'+m);
      qi.disabled=!cb.checked;
      if(cb.checked){box.style.borderColor=col;box.style.background=col+'11';lbl.style.color=col;}
      else{box.style.borderColor='';box.style.background='';lbl.style.color='var(--text)';}
    });
  });
  document.getElementById('edit-yes').onclick=()=>{
    const t=isBacklog?S.backlog[ii]:S.cats[ci].items[ii];
    t.name=document.getElementById('edit-name').value.trim()||t.name;
    t.qty=parseInt(document.getElementById('edit-qty').value)||1;
    t.members=S.members.filter(m=>{const cb=document.getElementById('em-'+m);return cb&&cb.checked;})
      .map(m=>({name:m,qty:parseInt(document.getElementById('emq-'+m).value)||1}));
    closeModal();render();
  };
}

function openRestoreModal(item){
  modal(`<div class="modal"><span class="mhandle"></span><h3>加回主要清單</h3>
    <div class="fg"><label>「${e(item.name)}」加入哪個分類？</label>
      <select id="rc-cat">${S.cats.map((c,i)=>`<option value="${i}">${e(c.cat)}</option>`).join('')}</select></div>
    <div class="mactions"><button class="btn" id="rc-no">取消</button><button class="btn accent" id="rc-yes">加入</button></div>
  </div>`);
  document.getElementById('rc-no').onclick=closeModal;
  document.getElementById('rc-yes').onclick=()=>{
    const ci=parseInt(document.getElementById('rc-cat').value);
    S.cats[ci].items.push(item); closeModal(); toast('已加回主清單'); render();
  };
}

function openRestoreMultiModal(ids){
  const count=ids.length;
  modal(`<div class="modal"><span class="mhandle"></span><h3>加回主要清單</h3>
    <div class="fg"><label>將 ${count} 個項目加入哪個分類？</label>
      <select id="rm-cat">${S.cats.map((c,i)=>`<option value="${i}">${e(c.cat)}</option>`).join('')}</select></div>
    <div class="mactions"><button class="btn" id="rm-no">取消</button><button class="btn accent" id="rm-yes">加入</button></div>
  </div>`);
  document.getElementById('rm-no').onclick=closeModal;
  document.getElementById('rm-yes').onclick=()=>{
    const ci=parseInt(document.getElementById('rm-cat').value);
    const idSet=new Set(ids);
    const toAdd=S.backlog.filter(it=>idSet.has(it.id));
    S.backlog=S.backlog.filter(it=>!idSet.has(it.id));
    toAdd.forEach(it=>S.cats[ci].items.push(it));
    closeModal(); exitSel(); toast(`已將 ${toAdd.length} 個項目加入「${S.cats[ci].cat}」`); render();
  };
}

function openAddBacklogModal(){
  const count=S.backlog.length;
  modal(`<div class="modal"><span class="mhandle"></span><h3>加入全部備用項目</h3>
    <div class="fg"><label>將全部 ${count} 個備用項目加入哪個分類？</label>
      <select id="ab-cat">${S.cats.map((c,i)=>`<option value="${i}">${e(c.cat)}</option>`).join('')}</select></div>
    <div class="mactions"><button class="btn" id="ab-no">取消</button><button class="btn accent" id="ab-yes">加入</button></div>
  </div>`);
  document.getElementById('ab-no').onclick=closeModal;
  document.getElementById('ab-yes').onclick=()=>{
    const ci=parseInt(document.getElementById('ab-cat').value);
    S.backlog.forEach(it=>S.cats[ci].items.push(it));
    S.backlog=[]; closeModal(); toast(`已將 ${count} 個項目加入「${S.cats[ci].cat}」`); render();
  };
}

function openMembersModal(){
  const chips=S.members.length===0
    ?'<span style="color:var(--text3);font-size:13px">尚未新增成員</span>'
    :S.members.map((m,i)=>{const col=mcolor(m);
      return `<div class="mchip"><div class="mdot" style="background:${col}"></div>${e(m)}<span class="mdel" data-mi="${i}">×</span></div>`;
    }).join('');
  modal(`<div class="modal"><span class="mhandle"></span><h3>成員管理</h3>
    <div class="mlist">${chips}</div>
    <div class="fg"><label>新增成員</label>
      <div class="add-m-row"><input id="new-m" placeholder="輸入名稱">
        <button class="btn accent" id="add-m-btn"><i class="ti ti-plus"></i>新增</button></div></div>
    <div class="mactions"><button class="btn accent" id="m-done">完成</button></div>
  </div>`);
  document.getElementById('m-done').onclick=closeModal;
  document.getElementById('new-m').addEventListener('keydown',ev=>{if(ev.key==='Enter')doAddMember();});
  document.getElementById('add-m-btn').onclick=doAddMember;
  document.querySelectorAll('.mdel').forEach(el=>{
    el.addEventListener('click',()=>doDelMember(parseInt(el.dataset.mi)));
  });
  setTimeout(()=>{const el=document.getElementById('new-m');if(el)el.focus();},80);
}
function doAddMember(){
  const input=document.getElementById('new-m');const name=input.value.trim();
  if(!name){toast('請輸入名稱');return;}
  if(S.members.includes(name)){toast('成員已存在');return;}
  S.members.push(name); save(); openMembersModal();
}
function doDelMember(i){
  const name=S.members[i];
  showConfirm(`移除成員「${name}」？`,'相關指定記錄也會一併移除',()=>{
    S.members.splice(i,1);
    S.cats.forEach(c=>c.items.forEach(it=>{it.members=it.members.filter(m=>m.name!==name);delete it.mc[name];}));
    save(); openMembersModal(); render();
  });
}

// ── Utils ──────────────────────────────────────────────────────────
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return e(s);}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

// ── Init ───────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
